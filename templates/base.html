{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Campus Event System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

<!-- NAVBAR -->
<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-xl font-bold text-blue-600">
            Campus System
        </h1>

        <nav class="space-x-6 text-gray-600 font-medium">
            <a href="{% url 'home' %}" class="hover:text-blue-600">Home</a>
            <a href="{% url 'club' %}" class="hover:text-blue-600">Club</a>
            <a href="{% url 'event' %}" class="hover:text-blue-600">Event</a>
            <a href="{% url 'user' %}" class="hover:text-blue-600">Users</a>
        </nav>

    </div>
</header>

<!-- MAIN CONTENT -->
<main class="flex-1 max-w-6xl mx-auto w-full px-6 py-10">

    {% block content %}
    {% endblock content %}

</main>

<!-- FOOTER -->
<footer class="bg-white border-t mt-10">
    <div class="max-w-6xl mx-auto px-6 py-6 text-center text-gray-500 text-sm">
        © 2026 Campus Event & Club System.
    </div>
</footer>

</body>
</html>
