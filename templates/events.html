{% extends 'base.html' %}

{% block content %}

<h1 class="text-2xl font-bold mb-6">Events</h1>

{% for event in events %}
    <div class="bg-white p-4 mb-4 rounded shadow">
        <h2 class="text-xl font-semibold">{{ event.title }}</h2>
        <p>{{ event.description }}</p>
        <p class="text-sm text-gray-500">{{ event.event_date }}</p>
    </div>
{% endfor %}

{% endblock %}
